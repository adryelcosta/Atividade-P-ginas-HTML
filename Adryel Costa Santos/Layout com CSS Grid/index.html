<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Layout com CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grid-container">

    <header>
        <h1>Minha Página Grid</h1>
    </header>

    <nav>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Serviços</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </nav>

    <main>
        <h2>Bem-vindo</h2>
        <p>
            Este é o conteúdo principal da página. Aqui você pode colocar textos,
            imagens, artigos ou qualquer informação importante.
        </p>

        <div class="cards">
            <div class="card">Conteúdo 1</div>
            <div class="card">Conteúdo 2</div>
            <div class="card">Conteúdo 3</div>
        </div>
    </main>

    <footer>
        <p>© 2026 Minha Página Grid</p>
    </footer>

</div>

</body>
</html>
